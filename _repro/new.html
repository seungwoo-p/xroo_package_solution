<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XROO — 프로젝트 추가하기 (재현)</title>
<style>
:root{
  --color-coolgrey-600:#8B8E97;
  --background:#ffffff;--foreground:#171719;
  --bg-primary:#FFFFFF;--bg-secondary:#F7F7F8;--bg-tertiary:#F4F4F5;--bg-sidebar:#171719;
  --bg-brand:#178551;--bg-brand-hover:#136E44;--bg-brand-press:#0F5C39;--bg-brand-subtle:#EAF7F0;
  --fg-strong:#171719;--fg-default:#2E2F33;--fg-subtle:#46474C;--fg-assistive:#70737C;--fg-disabled:#AEB0B6;--fg-inverse:#FFFFFF;
  --fg-brand:#178551;--fg-brand-bright:#34C381;
  --line-default:rgba(112,115,124,0.22);--line-subtle:rgba(112,115,124,0.10);--line-strong:rgba(112,115,124,0.40);
  --radius-6:6px;--radius-8:8px;--radius-12:12px;--radius-16:16px;
  --elevation-overlay:0 12px 32px rgba(0,0,0,0.08),0 0 0 1px rgba(112,115,124,0.10);
  --font-sans:"Pretendard JP Variable","Pretendard Variable","Pretendard JP","Pretendard",-apple-system,BlinkMacSystemFont,"system-ui","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
}
html.dark{
  --background:#111213;--foreground:#F0F1F3;
  --bg-primary:#1C1D20;--bg-secondary:#111213;--bg-tertiary:#28292E;--bg-sidebar:#0D0E10;
  --bg-brand:#178551;--bg-brand-hover:#1C9A61;--bg-brand-press:#25AC6E;--bg-brand-subtle:#0C2B1A;
  --fg-strong:#F0F1F3;--fg-default:#C4C6CC;--fg-subtle:#9B9EA8;--fg-assistive:#82858F;--fg-disabled:#52555F;
  --fg-brand:#34C381;--fg-brand-bright:#6FD3A0;
  --line-default:rgba(255,255,255,0.09);--line-subtle:rgba(255,255,255,0.05);--line-strong:rgba(255,255,255,0.18);
  --elevation-overlay:0 12px 32px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.06);
}
.t-title-1{font-size:32px;line-height:44px;font-weight:700;letter-spacing:-0.81px;}
.t-heading-2{font-size:20px;line-height:28px;font-weight:700;letter-spacing:-0.24px;}
.t-caption-1{font-size:12px;line-height:16px;font-weight:600;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--font-sans);background:var(--bg-secondary);color:var(--foreground);font-size:16px;}
button{font-family:inherit;}svg{display:block;}
.app{display:flex;min-height:100vh;}

/* Sidebar */
.sidebar{width:240px;flex-shrink:0;height:100vh;position:sticky;top:0;display:flex;flex-direction:column;background:var(--bg-sidebar);color:var(--fg-inverse);}
.sb-brand{padding:28px 20px 24px;}.sb-logo{height:24px;width:auto;}
.sb-caption{margin-top:12px;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--fg-brand-bright);}
.sb-title{margin-top:6px;font-size:22px;font-weight:700;line-height:1.25;letter-spacing:-.01em;color:#fff;}
.sb-sub{margin-top:4px;font-size:12px;font-weight:500;color:var(--color-coolgrey-600);}
.sb-cta-wrap{padding:0 12px 12px;}
.sb-cta{width:100%;height:40px;border-radius:var(--radius-8);display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;color:#fff;border:none;cursor:pointer;background:var(--bg-brand);}
.sb-nav{flex:1;padding:0 12px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:0 12px;height:40px;border-radius:var(--radius-8);font-size:14px;font-weight:600;color:var(--color-coolgrey-600);cursor:pointer;border:none;background:transparent;}
.nav-item:hover{background:rgba(255,255,255,.04);}
.nav-item.active{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active svg{color:var(--fg-brand-bright);}
.nav-item svg{width:16px;height:16px;color:currentColor;flex-shrink:0;}
.sb-bottom{padding:12px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:8px;}
.sb-cat{color:var(--color-coolgrey-600);font-size:11px;font-weight:600;padding:0 4px;}
.theme-toggle{display:inline-flex;padding:2px;border-radius:var(--radius-8);background:rgba(255,255,255,.04);width:100%;gap:2px;}
.seg{flex:1;height:36px;border-radius:var(--radius-6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:600;color:var(--fg-assistive);border:none;background:transparent;cursor:pointer;}
.seg.active{background:rgba(255,255,255,.15);color:#fff;}.seg svg{width:13px;height:13px;}
.sb-logout{display:flex;align-items:center;gap:8px;padding:0 4px;height:32px;font-size:13px;font-weight:600;color:var(--fg-assistive);background:none;border:none;cursor:pointer;}
.sb-logout svg{width:16px;height:16px;}

/* Main */
.main{flex:1;min-width:0;padding:32px 40px 40px;}
.content{max-width:1320px;margin:0 auto;}
.page-head{display:flex;align-items:center;gap:12px;}
.back{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-8);border:1px solid var(--line-default);background:var(--bg-primary);color:var(--fg-default);cursor:pointer;flex-shrink:0;}
.back:hover{background:var(--bg-tertiary);}.back svg{width:16px;height:16px;}
.ver{margin-left:auto;display:inline-flex;align-items:center;padding:0 8px;height:24px;border-radius:var(--radius-6);background:var(--bg-tertiary);color:var(--fg-strong);font-size:12px;font-weight:600;}

/* sections */
.sections{display:flex;flex-direction:column;gap:16px;margin-top:24px;}
.section{border-radius:var(--radius-16);background:var(--bg-primary);border:1px solid var(--line-default);padding:20px;}
.sec-title{font-size:20px;font-weight:700;letter-spacing:-.24px;color:var(--fg-strong);}
/* ⚠️ sec-body: 세로 흐름 gap으로 간격 처리 (이전 .field+.field 버그 제거) */
.sec-body{margin-top:16px;display:flex;flex-direction:column;gap:16px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
.field{display:flex;flex-direction:column;gap:8px;min-width:0;}
.lbl{font-size:12px;font-weight:600;color:var(--fg-default);}
.req{color:var(--fg-strong);}
.inp{width:100%;height:40px;border-radius:var(--radius-8);outline:none;font-size:13px;font-weight:500;color:var(--fg-strong);border:1px solid var(--line-strong);background:var(--bg-primary);padding:0 14px;transition:all .15s;}
.inp::placeholder{color:var(--fg-assistive);}
.inp:focus{border-color:var(--fg-brand);box-shadow:0 0 0 3px rgba(52,195,129,.2);}
.inp.tabular{font-variant-numeric:tabular-nums;}
.date-wrap{position:relative;}
.date-wrap .inp{padding-right:40px;}
.date-wrap .cal{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-6);border:none;background:transparent;color:var(--fg-subtle);cursor:pointer;}
.date-wrap .cal:hover{background:var(--bg-tertiary);}.date-wrap .cal svg{width:16px;height:16px;}
.helper{margin-top:-8px;font-size:12px;font-weight:600;color:var(--fg-assistive);}
textarea.inp{height:auto;min-height:100px;padding:12px;resize:none;line-height:1.5;}
.dropzone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius-12);padding:32px 0;border:1.5px dashed var(--line-strong);cursor:pointer;transition:.15s;}
.dropzone:hover{border-color:var(--fg-brand);}
.dropzone .up{width:24px;height:24px;color:var(--fg-assistive);}
.dropzone .t{font-size:13px;font-weight:500;color:var(--fg-default);}
.dropzone .t a{color:var(--fg-brand);text-decoration:underline;cursor:pointer;}
.dropzone .s{font-size:12px;font-weight:600;color:var(--fg-assistive);}
.access{display:flex;gap:8px;}
.btn-secondary{height:40px;padding:0 14px;border-radius:var(--radius-8);font-size:13px;font-weight:700;color:var(--fg-strong);background:var(--bg-tertiary);border:none;cursor:pointer;white-space:nowrap;}
.btn-secondary:hover{background:rgba(255,255,255,.1);}
.footer{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid var(--line-default);}
.btn-cancel{height:40px;padding:0 14px;border-radius:var(--radius-8);font-size:13px;font-weight:700;color:var(--fg-strong);background:var(--bg-tertiary);border:none;cursor:pointer;}
.btn-save{height:40px;padding:0 18px;border-radius:var(--radius-8);font-size:14px;font-weight:700;color:var(--fg-disabled);background:var(--bg-tertiary);border:none;cursor:not-allowed;}

/* §8.5 DatePicker popover */
.cal-pop{position:absolute;z-index:30;top:calc(100% + 8px);left:0;width:280px;padding:12px;background:var(--bg-primary);border-radius:var(--radius-12);border:1px solid var(--line-default);box-shadow:var(--elevation-overlay);display:none;}
.date-wrap.open .cal-pop{display:block;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.cal-mlabel{font-size:14px;font-weight:600;color:var(--fg-strong);font-variant-numeric:tabular-nums;}
.cal-nav{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-6);border:none;background:transparent;color:var(--fg-strong);cursor:pointer;}
.cal-nav:hover{background:var(--bg-tertiary);}.cal-nav svg{width:16px;height:16px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-wd{text-align:center;font-size:12px;font-weight:600;color:var(--fg-assistive);padding:4px 0;}
.cal-day{height:32px;border-radius:var(--radius-6);font-size:13px;font-weight:500;color:var(--fg-strong);background:transparent;border:1px solid transparent;cursor:pointer;font-variant-numeric:tabular-nums;}
.cal-day:hover{background:var(--bg-brand-subtle);}
.cal-day.dim{color:var(--fg-disabled);}
.cal-day.today{border-color:var(--fg-brand);}
.cal-day.sel{background:var(--bg-brand);color:#fff;border-color:var(--bg-brand);}
.cal-foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
.cal-foot button{font-size:13px;font-weight:600;color:var(--fg-brand);background:none;border:none;cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-brand">
      <svg class="sb-logo" viewBox="0 0 396 100" fill="none" aria-label="XROO"><path d="M241.07 0C268.68 0 291.07 22.39 291.07 50C291.07 77.61 268.68 100 241.07 100C213.46 100 191.07 77.61 191.07 50C191.07 22.39 213.46 0 241.07 0ZM345.07 0C372.68 0 395.07 22.39 395.07 50C395.07 77.61 372.68 100 345.07 100C317.46 100 295.07 77.61 295.07 50C295.07 22.39 317.46 0 345.07 0ZM24.5231 2C24.8429 2.00015 25.1428 2.15028 25.3327 2.41016L47.0426 32.1699L68.7428 2.41016C68.9328 2.15022 69.2325 2.00007 69.5524 2H93.0729C93.8827 2.00021 94.3624 2.92992 93.8825 3.58984L60.0329 50L93.8727 96.4102C94.3526 97.0701 93.8821 98 93.0622 98H69.5426C69.2227 98 68.9231 97.8498 68.7331 97.5898L47.0329 67.8301L25.3327 97.5898C25.1428 97.8497 24.8429 97.9999 24.5231 98H1.0026C0.192621 98 -0.286964 97.0701 0.193028 96.4102L34.0329 50L0.193028 3.58984C-0.286964 2.92985 0.182622 2.00003 1.0026 2H24.5231ZM147.039 2C165.819 2 181.039 17.22 181.039 36C181.039 49.3799 173.309 60.95 162.069 66.5L183.879 96.4102C184.359 97.0701 183.889 97.9998 183.069 98H159.548C159.229 97.9999 158.929 97.8498 158.739 97.5898L138.619 70H124.039V97C124.039 97.55 123.589 98 123.039 98H105.039C104.489 98 104.039 97.55 104.039 97V3C104.039 2.45001 104.489 2.00001 105.039 2H147.039ZM241.07 20C224.5 20 211.07 33.43 211.07 50C211.07 66.57 224.5 80 241.07 80C257.64 80 271.07 66.57 271.07 50C271.07 33.43 257.64 20 241.07 20ZM345.07 20C328.5 20 315.07 33.43 315.07 50C315.07 66.57 328.5 80 345.07 80C361.64 80 375.07 66.57 375.07 50C375.07 33.43 361.64 20 345.07 20ZM124.039 50H147.048C154.768 50 161.039 43.73 161.039 36C161.039 28.27 154.769 22 147.039 22H124.039V50Z" fill="white"/></svg>

  <main class="main">

<script>
/* ===== 테마 토글 (사이드바 시스템/라이트/다크) ===== */
(function(){
  const root=document.documentElement, tg=document.getElementById('themeToggle');
  const mq=window.matchMedia('(prefers-color-scheme: dark)');
  function apply(mode){
    const dark = mode==='dark' || (mode==='system' && mq.matches);
    root.classList.toggle('dark', dark);
    tg.querySelectorAll('.seg').forEach(s=>s.classList.toggle('active', s.dataset.theme===mode));
    localStorage.setItem('xroo-theme-mode', mode);
  }
  tg.querySelectorAll('.seg').forEach(s=>s.addEventListener('click',()=>apply(s.dataset.theme)));
  apply(localStorage.getItem('xroo-theme-mode')||'dark');
  mq.addEventListener('change',()=>{ if((localStorage.getItem('xroo-theme-mode')||'dark')==='system') apply('system'); });
})();

/* ===== §8.5 DatePicker ===== */
(function(){
  const WD=['일','월','화','수','목','금','토'];
  const TODAY={y:2026,m:5,d:4}; // 2026-06-04 (재현 기준일)
  document.querySelectorAll('.date-wrap').forEach(wrap=>{
    const input=wrap.querySelector('.inp'), btn=wrap.querySelector('.cal');
    let view={y:TODAY.y,m:TODAY.m}, selected=null;
    const pop=document.createElement('div'); pop.className='cal-pop'; wrap.appendChild(pop);
    function render(){
      const first=new Date(view.y,view.m,1).getDay();
      const dim=new Date(view.y,view.m+1,0).getDate();
      const prevDim=new Date(view.y,view.m,0).getDate();
      let cells='';
      for(let i=0;i<first;i++){cells+=`<button class="cal-day dim" disabled>${prevDim-first+1+i}</button>`;}
      for(let d=1;d<=dim;d++){
        const isToday=(view.y===TODAY.y&&view.m===TODAY.m&&d===TODAY.d);
        const isSel=(selected&&selected.y===view.y&&selected.m===view.m&&selected.d===d);
        cells+=`<button class="cal-day${isToday?' today':''}${isSel?' sel':''}" data-d="${d}">${d}</button>`;
      }
      const used=first+dim, trail=(7-(used%7))%7;
      for(let i=1;i<=trail;i++){cells+=`<button class="cal-day dim" disabled>${i}</button>`;}
      pop.innerHTML=`<div class="cal-head">
        <button class="cal-nav" data-nav="-1" aria-label="이전 달"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
        <span class="cal-mlabel">${view.y}년 ${view.m+1}월</span>
        <button class="cal-nav" data-nav="1" aria-label="다음 달"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
      </div>
      <div class="cal-grid">${WD.map(w=>`<div class="cal-wd">${w}</div>`).join('')}${cells}</div>
      <div class="cal-foot"><button data-act="today">오늘</button><button data-act="clear">지우기</button></div>`;
    }
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.date-wrap.open').forEach(w=>{if(w!==wrap)w.classList.remove('open');});
      const willOpen=!wrap.classList.contains('open');
      if(willOpen) render();
      wrap.classList.toggle('open');
    });
    pop.addEventListener('click',e=>{
      e.stopPropagation();
      const nav=e.target.closest('[data-nav]'); if(nav){view.m+=+nav.dataset.nav; if(view.m<0){view.m=11;view.y--;} if(view.m>11){view.m=0;view.y++;} render(); return;}
      const day=e.target.closest('.cal-day[data-d]'); if(day){const d=+day.dataset.d; selected={y:view.y,m:view.m,d}; input.value=`${view.y}-${String(view.m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; wrap.classList.remove('open'); return;}
      const act=e.target.closest('[data-act]'); if(act){ if(act.dataset.act==='today'){view={y:TODAY.y,m:TODAY.m}; selected={...TODAY}; input.value=`${TODAY.y}-${String(TODAY.m+1).padStart(2,'0')}-${String(TODAY.d).padStart(2,'0')}`;} else {selected=null; input.value='';} wrap.classList.remove('open'); }
    });
  });
  document.addEventListener('click',e=>{ if(!e.target.closest('.date-wrap')) document.querySelectorAll('.date-wrap.open').forEach(w=>w.classList.remove('open')); });
})();
</script>
</body>
</html>

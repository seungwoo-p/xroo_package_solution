<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XROO — 사용자 관리 (재현)</title>
<style>
:root{
  --color-coolgrey-600:#8B8E97;
  --background:#ffffff;--foreground:#171719;
  --bg-primary:#FFFFFF;--bg-secondary:#F7F7F8;--bg-tertiary:#F4F4F5;--bg-sidebar:#171719;
  --bg-brand:#178551;--bg-brand-hover:#136E44;--bg-brand-press:#0F5C39;
  --fg-strong:#171719;--fg-default:#2E2F33;--fg-subtle:#46474C;--fg-assistive:#70737C;--fg-disabled:#AEB0B6;--fg-inverse:#FFFFFF;
  --fg-brand:#178551;--fg-brand-bright:#34C381;
  --line-default:rgba(112,115,124,0.22);--line-subtle:rgba(112,115,124,0.10);--line-strong:rgba(112,115,124,0.40);
  --radius-6:6px;--radius-8:8px;--radius-12:12px;--radius-16:16px;--radius-full:9999px;
  --font-sans:"Pretendard JP Variable","Pretendard Variable","Pretendard JP","Pretendard",-apple-system,BlinkMacSystemFont,"system-ui","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  --font-mono:"Pretendard JP Variable","Pretendard Variable","SF Mono","JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
}
html.dark{
  --background:#111213;--foreground:#F0F1F3;
  --bg-primary:#1C1D20;--bg-secondary:#111213;--bg-tertiary:#28292E;--bg-sidebar:#0D0E10;
  --bg-brand:#178551;--bg-brand-hover:#1C9A61;--bg-brand-press:#25AC6E;
  --fg-strong:#F0F1F3;--fg-default:#C4C6CC;--fg-subtle:#9B9EA8;--fg-assistive:#82858F;--fg-disabled:#52555F;
  --fg-brand:#34C381;--fg-brand-bright:#6FD3A0;
  --line-default:rgba(255,255,255,0.09);--line-subtle:rgba(255,255,255,0.05);--line-strong:rgba(255,255,255,0.18);
}
.t-title-1{font-size:32px;line-height:44px;font-weight:700;letter-spacing:-0.81px;}
.t-label-2{font-size:13px;line-height:18px;font-weight:600;}
.t-caption-1{font-size:12px;line-height:16px;font-weight:600;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--font-sans);background:var(--bg-secondary);color:var(--foreground);font-size:16px;}
button{font-family:inherit;}svg{display:block;}
.app{display:flex;min-height:100vh;}

/* Sidebar (§8.18) */
.sidebar{width:240px;flex-shrink:0;height:100vh;position:sticky;top:0;display:flex;flex-direction:column;background:var(--bg-sidebar);color:var(--fg-inverse);}
.sb-brand{padding:28px 20px 24px;}
.sb-logo{height:24px;width:auto;}
.sb-caption{margin-top:12px;font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--fg-brand-bright);}
.sb-title{margin-top:6px;font-size:22px;font-weight:700;line-height:1.25;letter-spacing:-.01em;color:#fff;}
.sb-sub{margin-top:4px;font-size:12px;font-weight:500;color:var(--color-coolgrey-600);}
.sb-cta-wrap{padding:0 12px 12px;}
.sb-cta{width:100%;height:40px;border-radius:var(--radius-8);display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;color:#fff;border:none;cursor:pointer;background:var(--bg-brand);}
.sb-cta:hover{background:var(--bg-brand-hover);}
.sb-nav{flex:1;padding:0 12px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:0 12px;height:40px;border-radius:var(--radius-8);font-size:14px;font-weight:600;color:var(--color-coolgrey-600);cursor:pointer;border:none;background:transparent;}
.nav-item:hover{background:rgba(255,255,255,.04);}
.nav-item.active{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active svg{color:var(--fg-brand-bright);}
.nav-item svg{width:16px;height:16px;color:currentColor;flex-shrink:0;}
.sb-bottom{padding:12px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:8px;}
.sb-cat{color:var(--color-coolgrey-600);font-size:11px;font-weight:600;padding:0 4px;}
.theme-toggle{display:inline-flex;padding:2px;border-radius:var(--radius-8);background:rgba(255,255,255,.04);width:100%;gap:2px;}
.seg{flex:1;height:36px;border-radius:var(--radius-6);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-weight:600;color:var(--fg-assistive);border:none;background:transparent;cursor:pointer;}
.seg.active{background:rgba(255,255,255,.15);color:#fff;}
.seg svg{width:13px;height:13px;}
.sb-logout{display:flex;align-items:center;gap:8px;padding:0 4px;height:32px;font-size:13px;font-weight:600;color:var(--fg-assistive);background:none;border:none;cursor:pointer;}
.sb-logout:hover{color:#fff;}.sb-logout svg{width:16px;height:16px;}

/* Main */
.main{flex:1;min-width:0;padding:32px 40px 40px;}
.content{max-width:1320px;margin:0 auto;}
.page-head{display:flex;align-items:center;justify-content:space-between;}
.page-head .left{display:flex;align-items:center;gap:8px;}
.count-badge{display:inline-flex;align-items:center;padding:0 8px;height:24px;border-radius:var(--radius-6);background:var(--bg-tertiary);color:var(--fg-strong);font-size:12px;font-weight:600;}
.icon-btn-bordered{width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-8);border:1px solid var(--line-strong);background:var(--bg-primary);color:var(--fg-strong);cursor:pointer;}
.icon-btn-bordered:hover{background:var(--bg-tertiary);}.icon-btn-bordered svg{width:16px;height:16px;}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:8px;margin-top:24px;}
.search-wrap{position:relative;width:320px;}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--fg-assistive);}
.search-input{width:100%;height:40px;border-radius:var(--radius-8);outline:none;font-size:13px;font-weight:500;color:var(--fg-strong);border:1px solid var(--line-strong);background:var(--bg-primary);padding:0 14px 0 40px;transition:all .15s;}
.search-input::placeholder{color:var(--fg-assistive);}
.search-input:focus{border-color:var(--fg-brand);box-shadow:0 0 0 3px rgba(52,195,129,.2);}
.btn-secondary{height:40px;padding:0 14px;border-radius:var(--radius-8);font-size:13px;font-weight:700;color:var(--fg-strong);background:var(--bg-tertiary);border:none;cursor:pointer;}
.btn-secondary:hover{background:rgba(255,255,255,.1);}
.btn-secondary.disabled{color:var(--fg-disabled);cursor:not-allowed;}
.spacer{margin-left:auto;}
.btn-primary{height:40px;padding:0 18px;border-radius:var(--radius-8);font-size:14px;font-weight:700;color:#fff;background:var(--bg-brand);border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.btn-primary:hover{background:var(--bg-brand-hover);}.btn-primary svg{width:16px;height:16px;}

/* §8.12 Table */
.table-wrap{margin-top:16px;background:var(--bg-primary);border:1px solid var(--line-default);border-radius:var(--radius-12);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--line-strong);}
th{height:44px;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;color:var(--fg-assistive);}
th.cb{width:40px;}
tbody tr{height:40px;border-bottom:1px solid var(--line-subtle);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bg-tertiary);}
td{padding:0 12px;font-size:13px;font-weight:600;}
td.id{color:var(--fg-strong);}
td.desc{color:var(--fg-default);}
td.date{color:var(--fg-subtle);font-family:var(--font-mono);}
td.act{text-align:right;}
.cb-box{width:18px;height:18px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;background:var(--bg-primary);border:1.5px solid var(--line-strong);cursor:pointer;}
.row-act{display:inline-flex;gap:4px;opacity:0;transition:opacity .15s;}
tbody tr:hover .row-act{opacity:1;}
.row-act button{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-6);border:none;background:transparent;color:var(--fg-strong);cursor:pointer;}
.row-act button:hover{background:var(--bg-tertiary);}
.row-act svg{width:16px;height:16px;}

/* pagination */
.pager{display:flex;align-items:center;justify-content:space-between;margin-top:20px;}
.select{position:relative;}
.select-trigger{height:32px;padding:0 32px 0 12px;border-radius:var(--radius-8);border:1px solid var(--line-strong);background:var(--bg-primary);color:var(--fg-strong);font-size:13px;font-weight:500;display:inline-flex;align-items:center;position:relative;cursor:pointer;}
.select-trigger svg{position:absolute;right:10px;width:16px;height:16px;color:var(--fg-assistive);}
.page-nums{display:flex;align-items:center;gap:4px;}
.page-arrow{min-width:29px;height:32px;padding:0 12px;border-radius:var(--radius-6);font-size:13px;font-weight:600;color:var(--fg-subtle);background:none;border:none;cursor:pointer;opacity:.4;}
.page-num{min-width:32px;height:32px;padding:0 8px;border-radius:var(--radius-6);font-size:13px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;border:none;cursor:pointer;background:var(--bg-brand);color:#fff;}
</style>

<script>
/* 테마 토글 (시스템/라이트/다크) */
(function(){
  const root=document.documentElement, tg=document.querySelector('.theme-toggle'); if(!tg)return;
  const segs=tg.querySelectorAll('.seg'), modes=['system','light','dark'], mq=matchMedia('(prefers-color-scheme: dark)');
  function apply(mode){const dark=mode==='dark'||(mode==='system'&&mq.matches);root.classList.toggle('dark',dark);segs.forEach((s,i)=>s.classList.toggle('active',modes[i]===mode));localStorage.setItem('xroo-theme-mode',mode);}
  segs.forEach((s,i)=>s.addEventListener('click',()=>apply(modes[i])));
  apply(localStorage.getItem('xroo-theme-mode')||'dark');
  mq.addEventListener('change',()=>{if((localStorage.getItem('xroo-theme-mode')||'dark')==='system')apply('system');});
})();
</script>
